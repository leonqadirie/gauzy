name = "gauzy"
version = "2.0.4"

description = "gauzy is a Gleam library providing flexible implementations of probabilistic data structures"
licences = ["Apache-2.0"]
repository = { type = "github", user = "leonqadirie", repo = "gauzy" }

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
iv = ">= 1.2.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
murmur3a = ">= 1.0.0 and < 2.0.0"
glinter = ">= 2.19.0 and < 3.0.0"
glychee = ">= 1.1.3 and < 2.0.0"

[tools.glinter]
include = ["src/", "test/"]

# In tests these rules are false positives: gleeunit discovers `*_test`
# functions by reflection (so they look unused), and `let assert` is the
# idiomatic way to assert (a failed assert should fail the test).
[tools.glinter.ignore]
"test/**/*.gleam" = ["unused_exports", "assert_ok_pattern"]
